name: "Stage 1 — Basic CI (Startup)"

# ── Triggers ────────────────────────────────────────────────────
# This pipeline runs automatically when:
on:
  push:
    branches: [main]        # every push to main branch
  pull_request:
    branches: [main]        # every pull request targeting main

# ── Jobs ────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Run Tests ────────────────────────────────────────
  test:
    name: Install & Test
    runs-on: ubuntu-latest   # GitHub's free cloud computer

    steps:
      # Step 1: Download your code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js on the runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step 3: Install all dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run the linter (catch code style issues)
      - name: Run lint
        run: npx eslint src/ --ext .js || true

      # Step 5: Run all 19 tests
      # If any test fails → pipeline stops here, nothing gets built
      - name: Run tests
        run: ./node_modules/.bin/jest --coverage

      # Step 6: Upload coverage report as artifact
      # You can download and view this in GitHub Actions UI
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 2: Build Docker Image ──────────────────────────────
  # This job only runs if the test job passes
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test              # ← depends on test job passing

    steps:
      # Step 1: Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Build the Docker image
      # Tags it with the git commit SHA for traceability
      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            -t cicd-evolution-api:${{ github.sha }} \
            -t cicd-evolution-api:latest \
            .

      # Step 3: Verify the container actually starts
      - name: Smoke test the container
        run: |
          docker run -d -p 3000:3000 --name test-container cicd-evolution-api:latest
          sleep 3
          curl --fail http://localhost:3000/health
          docker stop test-container
