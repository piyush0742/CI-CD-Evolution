name: "Stage 1 — Basic CI (Startup)"

# ── Triggers ────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Jobs ────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Run Tests ────────────────────────────────────────
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2        # ✅ updated

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0      # ✅ updated
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npx eslint src/ --ext .js || true

      - name: Run tests
        run: ./node_modules/.bin/jest --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2  # ✅ updated
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 2: Build Docker Image ──────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2        # ✅ updated

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            -t cicd-evolution-api:${{ github.sha }} \
            -t cicd-evolution-api:latest \
            .

      - name: Smoke test the container
        run: |
          docker run -d -p 3000:3000 --name test-container cicd-evolution-api:latest
          sleep 3
          curl --fail http://localhost:3000/health
          docker stop test-container
