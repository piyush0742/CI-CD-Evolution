name: "Stage 2 — Optimized CI (Growing Startup)"

# ── Triggers ────────────────────────────────────────────────────
on:
  push:
    branches: [stage-2]
  pull_request:
    branches: [stage-2]

# ── Environment Variables ────────────────────────────────────────
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ── Jobs ────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2        # ✅ updated

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0      # ✅ updated
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npx eslint src/ --ext .js || true

  # ── Job 2: Test ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2        # ✅ updated

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0      # ✅ updated
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: ./node_modules/.bin/jest --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2  # ✅ updated
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 3: Build & Push ─────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [lint, test]

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2        # ✅ updated

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker run -d -p 3000:3000 --name test-container \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sleep 3
          curl --fail http://localhost:3000/health
          docker stop test-container
