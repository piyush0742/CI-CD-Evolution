name: "Stage 2 — Optimized CI (Growing Startup)"

# ── Triggers ────────────────────────────────────────────────────
on:
  push:
    branches: [stage-2]
  pull_request:
    branches: [stage-2]

# ── Environment Variables ────────────────────────────────────────
env:
  REGISTRY: ghcr.io                                      # GitHub Container Registry
  IMAGE_NAME: ${{ github.repository }}                   # e.g. piyush0742/ci-cd-evolution

# ── Jobs ────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────
  # Runs in PARALLEL with test job
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"                 # ✅ NEW: cache npm dependencies

      - name: Install dependencies
        run: npm ci                    # faster than npm install in CI

      - name: Run lint
        run: npx eslint src/ --ext .js || true

  # ── Job 2: Test ─────────────────────────────────────────────
  # Runs in PARALLEL with lint job
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"                 # ✅ NEW: cache npm dependencies

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: ./node_modules/.bin/jest --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 3: Build & Push ─────────────────────────────────────
  # Only runs after BOTH lint and test pass
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [lint, test]              # ✅ NEW: waits for both parallel jobs

    # Only push image on main branch (not on PRs)
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write                # needed to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ NEW: Setup Docker Buildx (enables layer caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ NEW: Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-provided by GitHub

      # ✅ NEW: Generate image tags automatically
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-           # e.g. sha-abc1234
            type=raw,value=latest          # always tag latest on main

      # ✅ NEW: Build with layer caching + push to GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cache-from: type=gha           # ✅ read cache from GitHub Actions
          cache-to: type=gha,mode=max    # ✅ write cache to GitHub Actions

      # ✅ NEW: Smoke test the pushed image
      - name: Smoke test
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker run -d -p 3000:3000 --name test-container \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sleep 3
          curl --fail http://localhost:3000/health
          docker stop test-container
